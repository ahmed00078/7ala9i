{% if has_prev or has_next %}
<div class="flex items-center gap-2 mt-6">
  {% if has_prev %}
  <a href="?{% for k, v in request.query_params.items() %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page - 1 }}"
     class="px-4 py-2 text-sm font-medium bg-white ring-1 ring-black/10 rounded-lg hover:bg-canvas transition-colors">
    Précédent
  </a>
  {% endif %}
  <span class="text-sm text-ink/50">Page {{ page }}</span>
  {% if has_next %}
  <a href="?{% for k, v in request.query_params.items() %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page + 1 }}"
     class="px-4 py-2 text-sm font-medium bg-white ring-1 ring-black/10 rounded-lg hover:bg-canvas transition-colors">
    Suivant
  </a>
  {% endif %}
</div>
{% endif %}
