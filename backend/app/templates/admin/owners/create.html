{% extends "admin/base.html" %}
{% block title %}Nouveau propriétaire — 7ala9i Admin{% endblock %}
{% block page_title %}Nouveau propriétaire{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="bg-white ring-1 ring-black/5 rounded-2xl p-6">
    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-50 text-red-700 rounded-lg text-sm ring-1 ring-red-200">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/owners/new" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Prénom</label>
          <input name="first_name" required class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Nom</label>
          <input name="last_name" required class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-ink/70 mb-1">Téléphone</label>
        <input name="phone" type="tel" required class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
      </div>
      <div>
        <label class="block text-xs font-medium text-ink/70 mb-1">Mot de passe</label>
        <input name="password" type="password" required class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
      </div>
      <hr class="border-black/5">
      <p class="text-xs font-semibold uppercase tracking-wide text-ink/50">Salon</p>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Nom (FR)</label>
          <input name="salon_name" required class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Nom (AR)</label>
          <input name="salon_name_ar" class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-ink/70 mb-1">Adresse</label>
        <input name="address" class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Ville</label>
          <input name="city" value="Nouakchott" class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
        <div>
          <label class="block text-xs font-medium text-ink/70 mb-1">Téléphone salon</label>
          <input name="salon_phone" type="tel" class="w-full border border-black/10 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <a href="/admin/owners" class="flex-1 text-center py-2.5 rounded-lg text-sm font-medium bg-canvas hover:bg-black/5 transition-colors">Annuler</a>
        <button type="submit" class="flex-1 bg-brand text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-brand-dark transition-colors">Créer</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
